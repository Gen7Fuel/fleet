services:
  fleet-portal:
    image: fleet-portal:latest
    build: .
    container_name: fleet-portal
    restart: unless-stopped
    ports:
      - "6000:3000"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - thehub_default
      - internal

networks:
  thehub_default:
    external: true
  internal:
    driver: bridge
