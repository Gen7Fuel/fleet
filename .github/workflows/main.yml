name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
      owner: ${{ steps.meta.outputs.owner }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "owner=${OWNER}" >> $GITHUB_OUTPUT
          echo "image=ghcr.io/${OWNER}/fleet-portal:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ghcr.io/${{ steps.meta.outputs.owner }}/fleet-portal:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /home/gen7fuel/fleet

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            git pull origin main

            export FLEET_IMAGE=${{ needs.build.outputs.image }}
            export MONGO_URI=${{ secrets.MONGO_URI }}

            OLD_IMAGE=$(docker inspect --format='{{.Image}}' fleet-portal 2>/dev/null || echo "")

            docker pull $FLEET_IMAGE

            if docker compose up -d --no-deps --wait fleet-portal; then
              echo "SUCCESS: fleet-portal is healthy."
            else
              echo "FATAL: fleet-portal failed health check!"
              docker logs fleet-portal --tail 50
              if [ -n "$OLD_IMAGE" ]; then
                echo "Rolling back to $OLD_IMAGE..."
                export FLEET_IMAGE=$OLD_IMAGE
                docker compose up -d --no-deps fleet-portal
              fi
              exit 1
            fi
